<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luvyx Weather</title>
    <style>
        :root { --bg: #0f0f0f; --panel: #1e1e1e; --accent: #3498db; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; text-align: center; }
        
        .card { background: var(--panel); padding: 30px; border-radius: 20px; width: 90%; max-width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333; }
        
        .city { font-size: 1.2rem; color: #888; margin-bottom: 10px; }
        .temp { font-size: 4rem; font-weight: bold; margin: 10px 0; color: var(--accent); }
        .desc { font-size: 1.5rem; text-transform: capitalize; margin-bottom: 20px; }
        
        .details { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; border-top: 1px solid #333; padding-top: 20px; font-size: 0.9rem; color: #aaa; }
        
        button { background: var(--accent); border: none; color: white; padding: 12px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 20px; width: 100%; }
        button:active { opacity: 0.8; }

        .icon { font-size: 50px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <div class="city" id="location">Zjišťuji polohu...</div>
        <div id="weather-icon" class="icon">⌛</div>
        <div class="temp" id="temp">--°C</div>
        <div class="desc" id="description">Načítám...</div>
        
        <div class="details">
            <div>Vítr: <span id="wind">--</span> km/h</div>
            <div>Vlhkost: <span id="humidity">--</span> %</div>
        </div>

        <button onclick="getLocation()">Aktualizovat</button>
    </div>

    <script>
        const weatherCodes = {
            0: "Jasno ☀️", 1: "Skoro jasno 🌤️", 2: "Polojasno ⛅", 3: "Zataženo ☁️",
            45: "Mlha 🌫️", 48: "Námraza 🌫️", 51: "Mírné mrholení 🌧️",
            61: "Déšť 🌧️", 63: "Silný déšť 🌧️", 71: "Sněžení ❄️",
            77: "Sněhová zrna ❄️", 80: "Přeháňky 🌦️", 95: "Bouřka ⚡"
        };

        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(fetchWeather, () => {
                    document.getElementById('location').innerText = "Přístup zamítnut";
                    document.getElementById('description').innerText = "Povolte GPS";
                });
            } else {
                alert("GPS není podporována vaším prohlížečem.");
            }
        }

        async function fetchWeather(position) {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            
            document.getElementById('location').innerText = `Lat: ${lat.toFixed(2)}, Lon: ${lon.toFixed(2)}`;

            try {
                const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&relative_humidity_2m=true`);
                const data = await response.json();
                
                const current = data.current_weather;
                const temp = Math.round(current.temperature);
                const code = current.weathercode;
                
                document.getElementById('temp').innerText = `${temp}°C`;
                document.getElementById('description').innerText = weatherCodes[code] || "Neznámé";
                document.getElementById('wind').innerText = current.windspeed;
                document.getElementById('humidity').innerText = data.current_weather_units ? "--" : "OK"; // API někdy vrací vlhkost jinak, pro zjednodušení teď takto

                // Ikona podle počasí
                const iconBox = document.getElementById('weather-icon');
                if (code === 0) iconBox.innerText = "☀️";
                else if (code < 4) iconBox.innerText = "☁️";
                else if (code < 70) iconBox.innerText = "🌧️";
                else if (code < 80) iconBox.innerText = "❄️";
                else iconBox.innerText = "⚡";

            } catch (error) {
                alert("Chyba při načítání dat.");
            }
        }

        // Spustit při načtení
        window.onload = getLocation;
    </script>
</body>
  </html>
